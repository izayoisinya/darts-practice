<!DOCTYPE html>
<html lang="ja">
  
  <head>
    
    <meta charset="UTF-8" />
    <title>Darts Practice</title>

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f1115" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Darts Practice" />

    <link rel="manifest" href="manifest.json" />
    
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/theme.css" />

    <link rel="stylesheet" href="css/layout/lay_core.css" />
    <link rel="stylesheet" href="css/layout/lay_header.css" />
    <link rel="stylesheet" href="css/layout/lay_round.css" />
    <link rel="stylesheet" href="css/layout/lay_input.css" />
    <link rel="stylesheet" href="css/layout/lay_stats.css" />
    <link rel="stylesheet" href="css/layout/lay_menu.css" />

    <link rel="stylesheet" href="css/responsive/phone.css" />
    <link rel="stylesheet" href="css/responsive/tablet.css" />
    <link rel="stylesheet" href="css/responsive/desktop.css" />
    
  </head>

  <body>
    
    <!-- ================= HEADER ================= -->
    <header class="header">
      
      <div class="score-panel">
        <div class="score-block">
          <div class="score-value" id="totalScore">0</div>
        </div>

        <button type="button" id="nextGameBtn" class="next-button" disabled>
          NEXT GAME
        </button>
      </div>
      
    </header>

    <!-- ================= MAIN ================= -->
    <main class="container">
      
      <!-- ===== ROUNDS ===== -->
      <section class="round-area">
        <h2>Rounds</h2>
        <div class="round-list">
          <div id="roundContainer"></div>
        </div>
      </section>

      <!-- ===== INPUT ===== -->
      <section class="input-area">
        <h2>Input</h2>

        <button type="button" class="bull-setting">
          <span class="label">Bull Mode</span>
          <span class="value">FAT</span>
        </button>

        <div class="top-buttons">
          <button type="button" data-display="Bull">Bull</button>
          <button type="button" data-display="InBull">In</button>
          <button type="button" data-display="Miss">Miss</button>
          <button type="button" id="undoBtn">戻る</button>
        </div>

        <div id="numberTable" class="number-table"></div>
      </section>

      <!-- ===== STATS ===== -->
      <section class="stats-area">
        <h2>Stats</h2>

        <!-- コンパクト表示 -->
        <div class="stats-compact">
          <div class="compact-block">
            <div class="compact-label">Bulls</div>
            <div class="compact-value" id="bullCountCompact">0</div>
            <div class="compact-sub" id="bullPercentCompact">0.0%</div>
          </div>

          <div class="compact-block">
            <div class="compact-label">Inner</div>
            <div class="compact-value" id="innerBullsCompact">0</div>
            <div class="compact-sub" id="innerBullPercentCompact">0.0%</div>
          </div>

          <div class="compact-block">
            <div class="compact-label">PPD</div>
            <div class="compact-value" id="ppdCompact">0.00</div>
          </div>

          <div class="compact-block">
            <div class="compact-label">Avg</div>
            <div class="compact-value" id="roundAvgCompact">0.00</div>
          </div>

          <div class="compact-block">
            <div class="compact-label">Max</div>
            <div class="compact-value" id="maxRoundCompact">0</div>
          </div>
        </div>

        <!-- 詳細表示 -->
        <div class="stats-detail">
          
          <div class="stats-left">
          
          <!-- ===== KPI行 ===== -->
          <div class="stats-kpi">
            <div class="kpi-item">
              <div class="kpi-label">PPD</div>
              <div class="kpi-value" id="ppd">0</div>
            </div>

            <div class="kpi-item">
              <div class="kpi-label">TOTAL</div>
              <div class="kpi-value" id="totalDartsStat">0</div>
            </div>

            <div class="kpi-item">
              <div class="kpi-label">AVG</div>
              <div class="kpi-value" id="roundAvg">0</div>
            </div>

            <div class="kpi-item">
              <div class="kpi-label">MAX</div>
              <div class="kpi-value" id="maxRound">0</div>
            </div>
          </div>

          <hr class="stats-divider" />

          <!-- ===== Bull系 ===== -->
          <div class="bull-group">
            <div class="stat-row">
              <span class="label">Bulls</span>
              <span class="count" id="bullCount">0</span>

              <div class="bar-bg">
                <div class="bar-fill" id="bullRateBar"></div>
              </div>

              <span class="percent" id="bullPercent">0.0%</span>
            </div>

            <div class="stat-row">
              <span class="label">Inner</span>
              <span class="count" id="innerBulls">0</span>

              <div class="bar-bg">
                <div class="bar-fill inner" id="innerBullRateBar"></div>
              </div>

              <span class="percent" id="innerBullPercent">0.0%</span>
            </div>
          </div>

          <hr class="stats-divider" />

          <div class="awards">
            <div class="award-card" id="award-hattrick">
              <div class="award-title">Hat Trick</div>
              <div class="award-value" id="hatTrick">0</div>
            </div>

            <div class="award-card" id="award-threeblack">
              <div class="award-title">3 in the Black</div>
              <div class="award-value" id="threeInTheBlack">0</div>
            </div>

            <div class="award-card" id="award-ton80">
              <div class="award-title">Ton 80</div>
              <div class="award-value" id="ton80">0</div>
            </div>

            <div class="award-card" id="award-highton">
              <div class="award-title">High Ton</div>
              <div class="award-value" id="highTon">0</div>
            </div>

            <div class="award-card" id="award-lowton">
              <div class="award-title">Low Ton</div>
              <div class="award-value" id="lowTon">0</div>
            </div>

            <div class="award-card" id="award-threebed">
              <div class="award-title">3 in the Bed</div>
              <div class="award-value" id="threeInTheBed">0</div>
            </div>

            <div class="award-card" id="award-whitehorse">
              <div class="award-title">White Horse</div>
              <div class="award-value" id="whiteHorse">0</div>
            </div>
          </div>

          </div>
          
          
<div class="stats-right">
  
  <h3>Score Graph</h3>
  <canvas id="scoreChart"></canvas>
  
</div>
        </div>
      </section>
      
    </main>

    <div id="menuOverlay" class="menu-overlay"></div>

    <!-- ================= MENU DRAWER ================= -->

    <div id="menuEdge" class="menu-edge"></div>

    <div id="sideMenu" class="side-menu" role="navigation">
      <div class="menu-header">Menu</div>

      <button data-link="index.html">Main Menu</button>

      <button data-link="countup.html">CountUp</button>

      <button disabled>01(Coming Soon)</button>
      
      <button disabled>Cricket(Coming Soon)</button>

      <button onclick="forceResetGame()">Reset Game</button>
    </div>

<script src="js/core.js" defer></script>

<script src="js/state.js" defer></script>
<script src="js/storage.js" defer></script>

<script src="js/stats.js" defer></script>
<script src="js/chart.js" defer></script>

<script src="js/game_core.js" defer></script>
<script src="js/game_countup.js" defer></script>
<script src="js/cu_ui.js" defer></script>

<script src="js/main.js" defer></script>
    
  </body>
  
</html>
