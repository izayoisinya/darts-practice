<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Darts Data</title>

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0,
                maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <meta name="theme-color" content="#0f1115" />

    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <meta name="apple-mobile-web-app-title" content="Darts Practice" />
    <link rel="apple-touch-icon" href="icon-192.png" />

    <link rel="manifest" href="manifest.json" />

    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/theme.css" />

    <link rel="stylesheet" href="css/layout/lay_menu.css" />
    <link rel="stylesheet" href="css/layout/lay_data.css" />

  </head>

  <body onload="initDataPage()">
    <header class="header">
      <h1>Statistics</h1>
    </header>

<main class="data-container">
  <div class="data-panel-top" id="dataPanelTop">
    <div class="panel-switcher" id="panelSwitcher">
      <button class="active" data-panel="history" onclick="setDataPanel('history')">History</button>
      <button data-panel="stats" onclick="setDataPanel('stats')">Stats</button>
    </div>
  </div>
  <div id="rightPanel">
    <section id="sessionsContainer"></section>
  </div>
  <div id="leftPanel">
    <section id="statsSection" class="data-summary-section">
      <h3 class="data-section-title">Stats</h3>
      <div id="statsContainer"></div>
    </section>
    <section id="detailBullRateWrapper" class="data-summary-section" style="display:none;">
      <h3 class="data-section-title">Bull Rate</h3>
      <div id="detailBullRateSection" class="detail-bull-rate"></div>
    </section>
    <section id="awardsSection" class="data-summary-section">
      <h3 class="data-section-title">Awards</h3>
      <div id="awardsContainer"></div>
    </section>
    <section id="calendarContainer" style="display:none;"></section>
    <section id="chartContainer" style="display:none;">
      <h3>Score Trend (Last 30 Games)</h3>
      <canvas id="scoreChart"></canvas>

      <div id="detailCompareSection" class="detail-compare-section" style="display:none;">
        <div class="detail-compare-controls">
          <label for="detailCompareSelect">比較日</label>
          <select id="detailCompareSelect"></select>
        </div>
        <div id="detailCompareTags" class="detail-compare-tags"></div>
        <div id="detailCompareLegend" class="range-chart-legend" style="display:none;"></div>
      </div>

      <div id="rangeChartSection" class="range-chart-section" style="display:none;">
        <h3>Score Trend (Selected Period)</h3>
        <div class="range-chart-controls">
          <div class="range-chart-row">
            <span class="range-prefix">A</span>
            <input id="rangeStartDate" type="date" />
            <span class="range-sep">~</span>
            <input id="rangeEndDate" type="date" />
          </div>
          <div class="range-chart-row">
            <span class="range-prefix">B</span>
            <input id="compareStartDate" type="date" />
            <span class="range-sep">~</span>
            <input id="compareEndDate" type="date" />
          </div>
          <div class="range-apply-row">
            <button id="rangeApplyBtn" type="button">Apply</button>
          </div>
        </div>
        <div id="rangeChartLegend" class="range-chart-legend" style="display:none;"></div>
        <canvas id="rangeScoreChart"></canvas>
      </div>

      <section id="ratingReferenceSection" class="rating-reference" style="display:none;"></section>
    </section>
  </div>
  <!-- タブボタンを右下に配置 -->
  <!-- フッター：パネル切替 / ページネーション / ビュータブ -->
<div class="footer-bar">
  <div class="pagination" id="paginationContainer">
    <button id="prevBtn" onclick="changePage('Prev')">Prev</button>
    <span class="page-info" id="pageInfo"></span>
    <button id="nextBtn" onclick="changePage('Next')">Next</button>
  </div>
<div class="tabs-container">
  <button class="active" data-view="game" onclick="changeView('game')">Game</button>
  <button data-view="day" onclick="changeView('day')">Day</button>
  <button data-view="week" onclick="changeView('week')">Week</button>
  <button data-view="month" onclick="changeView('month')">Month</button>
  <button data-view="year" onclick="changeView('year')">Year</button>
</div>
</div>
</main>

    <div id="groupNoteModal" class="group-note-modal" style="display:none;">
      <div class="group-note-dialog">
        <div class="group-note-header">
          <h3 id="groupNoteTitle">Group Memo</h3>
          <button id="groupNoteCloseBtn" type="button">×</button>
        </div>

        <label class="group-note-label" for="groupNoteComment">Comment</label>
        <textarea id="groupNoteComment" rows="5" placeholder="その日の調子、設定変更、飲酒有無などをメモ"></textarea>

        <label class="group-note-label" for="groupNoteTags">Tags (comma or space)</label>
        <input id="groupNoteTags" type="text" placeholder="例: 飲酒, 重いバレル, グリップ浅め" />
        <div id="groupNoteTagSuggestions" class="group-note-suggestions" style="display:none;"></div>

        <label class="group-note-label" for="groupNoteImageInput">Setup Image</label>
        <input id="groupNoteImageInput" type="file" accept="image/*" />
        <img id="groupNotePreview" class="group-note-preview-image" alt="preview" style="display:none;" />

        <div class="group-note-actions">
          <button id="groupNoteDeleteImageBtn" type="button">画像削除</button>
          <button id="groupNoteSaveBtn" type="button">保存</button>
        </div>
      </div>
    </div>

    <div id="menuOverlay" class="menu-overlay"></div>

    <!-- ================= MENU DRAWER ================= -->

    <div id="menuEdge" class="menu-edge"></div>

    <div id="sideMenu" class="side-menu" role="navigation">
      <div class="menu-header">Menu</div>

      <button data-link="index.html">Main Menu</button>

      <button data-link="countup.html">CountUp</button>

      <button disabled>01(Coming Soon)</button>

      <button disabled>Cricket(Coming Soon)</button>

      <button onclick="location.href = 'data.html'">Data</button>

      <button onclick="location.href = 'settings.html'">Settings</button>

      <button onclick="forceResetGame()">Reset Game</button>

      <button onclick="generateTestData(30)">テストデータ生成</button>
    </div>

    <!-- コア機能（最初に読み込む） -->
    <script src="js/core/state.js" defer></script>
    <script src="js/core/core.js" defer></script>
    <script src="js/core/storage.js" defer></script>

    <!-- データ関連 -->
    <script src="js/data/data_loader.js" defer></script>
    <script src="js/data/data_grouped.js" defer></script>
    <script src="js/data/data_detail.js" defer></script>
    <script src="js/data/rating.js" defer></script>
    <script src="js/data/data.js" defer></script>

    <!-- 初期化（最後に読み込む） -->
    <script src="js/init/main.js" defer></script>
  </body>
</html>
