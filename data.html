<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Darts Data</title>

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0,
                maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <meta name="theme-color" content="#0f1115" />

    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <meta name="apple-mobile-web-app-title" content="Darts Practice" />
    <link rel="apple-touch-icon" href="icon-192.png" />

    <link rel="manifest" href="manifest.json" />

    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/theme.css" />

    <link rel="stylesheet" href="css/layout/lay_menu.css" />
    <link rel="stylesheet" href="css/layout/lay_data.css" />

  </head>

  <body onload="initDataPage()">
    <header class="header">
      <h1>Statistics</h1>
    </header>

<main class="data-container">
  <section id="statsContainer"></section>
  <section id="sessionsContainer"></section>
  <!-- タブボタンを右下に配置 -->
  <!-- フッター：ページネーションとタブを同じ行に配置 -->
<div class="footer-bar">
  <div class="pagination" id="paginationContainer">
    <button id="prevBtn" onclick="changePage('Prev')">Prev</button>
    <span class="page-info" id="pageInfo"></span>
    <button id="nextBtn" onclick="changePage('Next')">Next</button>
  </div>
<div class="tabs-container">
  <button onclick="changeView('game')">Game</button>
  <button onclick="changeView('day')">Day</button>
  <button onclick="changeView('week')">Week</button>
  <button onclick="changeView('month')">Month</button>
  <button onclick="changeView('year')">Year</button>
</div>
</div>
</main>

    <div id="menuOverlay" class="menu-overlay"></div>

    <!-- ================= MENU DRAWER ================= -->

    <div id="menuEdge" class="menu-edge"></div>

    <div id="sideMenu" class="side-menu" role="navigation">
      <div class="menu-header">Menu</div>

      <button data-link="index.html">Main Menu</button>

      <button data-link="countup.html">CountUp</button>

      <button disabled>01(Coming Soon)</button>

      <button disabled>Cricket(Coming Soon)</button>

      <button onclick="location.href = 'data.html'">Data</button>

      <button onclick="location.href = 'settings.html'">Settings</button>

      <button onclick="forceResetGame()">Reset Game</button>

      <button onclick="generateTestData(30)">テストデータ生成</button>
    </div>

    <!-- コア機能（最初に読み込む） -->
    <script src="js/core/state.js" defer></script>
    <script src="js/core/core.js" defer></script>
    <script src="js/core/storage.js" defer></script>

    <!-- データ関連 -->
    <script src="js/data/data_loader.js" defer></script>
    <script src="js/data/data_grouped.js" defer></script>
    <script src="js/data/data_detail.js" defer></script>
    <script src="js/data/data.js" defer></script>

    <!-- 初期化（最後に読み込む） -->
    <script src="js/init/main.js" defer></script>
  </body>
</html>
