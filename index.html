<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Darts Practice</title>

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0,
    maximum-scale=1.0, user-scalable=no,
    viewport-fit=cover">

  <meta name="theme-color" content="#0f1115">

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="header">
  <div class="score-panel">

    <div class="score-block">
      <div class="total-label">TOTAL SCORE</div>
      <div class="score-value" id="totalScore">0</div>
    </div>

    <div class="darts-block">
      <div class="total-label">TOTAL DARTS</div>
      <div class="sub-value" id="totalDarts">0</div>
    </div>

    <button id="nextGameBtn" class="next-button" disabled>
      NEXT GAME
    </button>

  </div>
</header>

<!-- ================= MAIN ================= -->
<div class="container">

  <!-- ===== ROUNDS ===== -->
  <section class="round-area">
    <h2>Rounds</h2>
    <div class="round-list">
      <div id="roundContainer"></div>
    </div>
  </section>

  <!-- ===== INPUT ===== -->
  <section class="input-area">
    <h2>Input</h2>

    <div class="bull-setting">
      <span class="label">Bull Mode</span>
      <span class="value">FAT</span>
    </div>

    <div class="top-buttons">
      <button data-display="Bull">Bull</button>
      <button data-display="InBull">In</button>
      <button data-display="Miss">Miss</button>
      <button id="undoBtn">戻る</button>
    </div>

    <div id="numberTable" class="number-table"></div>
  </section>

  <!-- ===== STATS ===== -->
  <section class="stats-area">

    <!-- コンパクト表示 -->
    <div class="stats-compact">
      <div>Bulls <span id="bullCount">0</span></div>
      <div>Inner <span id="innerBulls">0</span></div>
      <div>PPD <span id="ppd">0.00</span></div>
      <div>Avg <span id="roundAvg">0.0</span></div>
      <div>Max <span id="maxRound">0</span></div>
    </div>

    <!-- 詳細表示 -->
    <div class="stats-detail">

      <div class="bull-group">

        <div class="stat-row">
          <span class="label">Bulls</span>
          <div class="bar-bg">
            <div class="bar-fill" id="bullRateBar"></div>
          </div>
          <span class="percent" id="bullPercent">0.0%</span>
        </div>

        <div class="stat-row">
          <span class="label">Inner</span>
          <div class="bar-bg">
            <div class="bar-fill inner" id="innerBullRateBar"></div>
          </div>
          <span class="percent" id="innerBullPercent">0.0%</span>
        </div>

      </div>

      <h3>Awards</h3>
      <div id="awardsContainer"></div>

      <h3>Score Graph</h3>
      <canvas id="scoreChart"></canvas>

    </div>

  </section>

</div>

<!-- iPhone Stats Toggle -->
<button id="statsToggleBtn" class="stats-toggle">▶</button>

<script src="script.js"></script>

</body>
</html>
