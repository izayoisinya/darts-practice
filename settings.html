<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Darts Settings</title>

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0,
                maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <meta name="theme-color" content="#0f1115" />

    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <meta name="apple-mobile-web-app-title" content="Darts Practice" />
    <link rel="apple-touch-icon" href="icon-192.png" />

    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/theme.css" />

    <link rel="stylesheet" href="css/layout/lay_core.css" />
    <link rel="stylesheet" href="css/layout/lay_menu.css" />

    <style>
      body {
        background:
          radial-gradient(circle at 15% 12%, rgba(0, 255, 200, 0.12), transparent 34%),
          radial-gradient(circle at 88% 0%, rgba(77, 171, 255, 0.12), transparent 30%),
          var(--bg-main);
      }

      .settings-container {
        width: min(520px, 100%);
        margin: auto;
        padding: 20px 16px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .settings-panel {
        background: linear-gradient(165deg, #151922 0%, #10141d 100%);
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow:
          0 10px 24px rgba(0, 0, 0, 0.4),
          0 0 0 1px rgba(0, 0, 0, 0.3) inset;
        padding: 14px;
      }

      .panel-title {
        margin: 0 0 12px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgb(var(--accent-rgb) / 0.92);
      }

      .setting-group {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }

      .setting-group + .setting-group {
        margin-top: 12px;
      }

      .setting-group label {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-main);
      }

      .setting-group select {
        height: 42px;
        padding: 0 12px;
        border-radius: 10px;
        background: #1a202a;
        color: var(--text-main);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .setting-group select:focus {
        outline: none;
        border-color: rgb(var(--accent-rgb) / 0.6);
        box-shadow: 0 0 0 3px rgb(var(--accent-rgb) / 0.15);
      }

      .setting-help {
        margin: 4px 0 0;
        font-size: 12px;
        line-height: 1.4;
        color: var(--text-muted);
      }

      .orientation-status {
        margin-top: 8px;
        font-size: 12px;
        color: var(--text-muted);
      }

      .storage-status-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .storage-status-item {
        background: #1a202a;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 10px;
      }

      .storage-status-label {
        display: block;
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 4px;
      }

      .storage-status-value {
        display: block;
        font-size: 16px;
        font-weight: 700;
        color: var(--text-main);
      }

      .storage-status-actions {
        margin-top: 10px;
        display: flex;
        justify-content: flex-end;
      }

      .storage-status-actions button {
        min-height: 40px;
        padding: 0 12px;
        font-size: 14px;
      }

      .storage-status-note {
        margin: 8px 0 0;
        font-size: 12px;
        color: var(--text-muted);
        line-height: 1.45;
      }

      @media (max-width: 480px) {
        .storage-status-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <header class="header">
      <h1>Settings</h1>
    </header>

    <main class="settings-container">
      <section class="settings-panel">
        <h2 class="panel-title">Game</h2>

        <div class="setting-group">
          <label for="bullModeSetting">Bull Mode</label>

          <select id="bullModeSetting">
            <option value="fat">FAT (50/50)</option>
            <option value="double">SEPARATE (50/25)</option>
          </select>
        </div>

        <div class="setting-group">
          <label for="roundSetting">Rounds</label>

          <select id="roundSetting" disabled>
            <option value="8">8</option>
            <option value="10">10</option>
            <option value="15">15</option>
          </select>
        </div>
      </section>

      <section class="settings-panel">
        <h2 class="panel-title">Display</h2>

        <div class="setting-group">
          <label for="orientationSetting">Screen Orientation</label>

          <select id="orientationSetting">
            <option value="auto">Free</option>
            <option value="portrait">Portrait Lock</option>
            <option value="landscape">Landscape Lock</option>
          </select>

          <p class="setting-help">
            一部端末ではブラウザ仕様上、画面回転ロックが適用されない場合があります。
          </p>
          <p id="orientationStatus" class="orientation-status"></p>
        </div>
      </section>

      <section class="settings-panel">
        <h2 class="panel-title">データ保存状況</h2>

        <div class="storage-status-grid">
          <div class="storage-status-item">
            <span class="storage-status-label">保存ゲーム数</span>
            <span class="storage-status-value" id="storageGameCount">-</span>
          </div>
          <div class="storage-status-item">
            <span class="storage-status-label">保存先</span>
            <span class="storage-status-value" id="storageBackend">-</span>
          </div>
          <div class="storage-status-item">
            <span class="storage-status-label">使用容量（概算）</span>
            <span class="storage-status-value" id="storageUsage">-</span>
          </div>
          <div class="storage-status-item">
            <span class="storage-status-label">利用上限（概算）</span>
            <span class="storage-status-value" id="storageQuota">-</span>
          </div>
        </div>

        <div class="storage-status-actions">
          <button id="refreshStorageStatusBtn" type="button">再計測</button>
        </div>

        <p id="storageStatusNote" class="storage-status-note">
          容量はブラウザ全体の概算です。実データのみの正確な容量ではありません。
        </p>
      </section>
      </div>
    </main>

    <div id="menuOverlay" class="menu-overlay"></div>

    <!-- ================= MENU DRAWER ================= -->

    <div id="menuEdge" class="menu-edge"></div>

    <div id="sideMenu" class="side-menu" role="navigation">
      <div class="menu-header">Menu</div>

      <button data-link="index.html">Main Menu</button>

      <button data-link="countup.html">CountUp</button>

      <button disabled>01(Coming Soon)</button>

      <button disabled>Cricket(Coming Soon)</button>

      <button onclick="location.href = 'data.html'">Data</button>

      <button onclick="location.href = 'settings.html'">Settings</button>

      <button onclick="forceResetGame()">Reset Game</button>
    </div>

    <!-- コア機能（最初に読み込む） -->
    <script src="js/core/state.js" defer></script>
    <script src="js/core/core.js" defer></script>
    <script src="js/core/storage.js" defer></script>

    <!-- ゲーム関連 -->
    <script src="js/game/stats.js" defer></script>
    <script src="js/game/game_core.js" defer></script>
    <script src="js/game/game_countup.js" defer></script>
    <script src="js/game/cu_ui.js" defer></script>

    <!-- UI -->
    <script src="js/ui/settings.js" defer></script>

    <!-- 初期化（最後に読み込む） -->
    <script src="js/init/main.js" defer></script>
  </body>
</html>
